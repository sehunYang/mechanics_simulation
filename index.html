<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>고전역학 시뮬레이터</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- 경고 바 -->
  <div id="warning-bar"></div>

  <!-- 모바일 전용: 햄버거 버튼 + 사이드바 배경 딤 (데스크톱에서는 CSS로 숨김) -->
  <button id="hamburger-btn" aria-label="메뉴 열기"><span></span><span></span><span></span></button>
  <div id="sidebar-overlay"></div>

  <!-- 앱 래퍼 -->
  <div id="app-wrapper">

    <!-- 사이드바 (팔레트) -->
    <div id="sidebar-left">
      <div class="palette-item" data-type="rect" title="네모 물체">■</div>
      <div class="palette-item" data-type="circle" title="원 물체">●</div>
      <div class="palette-separator"></div>
      <div class="palette-item" data-mode="floor_draw" title="바닥면 그리기">⌇</div>
      <div class="palette-item" data-type="forceZone" title="힘 구간">F</div>
      <div class="palette-item" data-type="extforce" title="외력">➜</div>
      <div class="palette-separator"></div>
      <div class="palette-item" data-mode="rope_draw" title="실 그리기">∿</div>
      <div class="palette-item" data-type="pulley" title="도르래">○</div>
      <div class="palette-item" data-type="spring" title="용수철">≈</div>
      <button id="btn-clear-all" class="sidebar-danger-btn" title="전체 삭제">🗑</button>
    </div>

    <!-- 캔버스 래퍼 -->
    <div id="canvas-wrapper">
      <canvas id="gridCanvas"></canvas>
      <canvas id="mainCanvas"></canvas>
      <div id="zoom-indicator">100%</div>

      <!-- 하단 컨트롤 → 떠있는 mode-bar pill (canvas-wrapper 기준 absolute) -->
      <div id="controls-bottom">
        <button class="ctrl-btn" id="btn-run">▶ 실행</button>
        <button class="ctrl-btn" id="btn-reset">↺ 초기화</button>
        <button class="ctrl-btn" id="btn-capture">📷 촬영</button>
        <button class="ctrl-btn" id="btn-gravity">⊙ 무중력</button>
      </div>
    </div>

    <!-- 속성 패널 (기본 hidden) -->
    <div id="panel-right">
      <div class="panel-label">속성</div>
      <!-- Sprint 3에서 채워짐 -->
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/coords.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/render.js"></script>
  <script src="js/elements.js"></script>
  <script src="js/hit-test.js"></script>
  <script src="js/interaction.js"></script>
  <script src="js/ui-controls.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/capture.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/panel.js"></script>
  <script src="js/boot.js"></script>
</body>
</html>
